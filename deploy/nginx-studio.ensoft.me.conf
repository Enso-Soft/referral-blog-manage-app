# ============================================
# studio.ensoft.me — referral-blog 프론트엔드 (Next.js, 127.0.0.1:8015)
#   /       → 랜딩 (app/(landing))
#   /app/*  → 서비스/스튜디오 (app/app/(studio))
#   둘 다 같은 Next.js 앱(8015)이 처리하므로 nginx 는 단순 프록시.
#
# 적용:
#   1) 아래 server 블록을 /etc/nginx/sites-available/enso-soft.conf 의
#      ensoft.me 영역(ai.ensoft.me 블록 근처)에 추가
#   2) sudo cp /etc/nginx/sites-available/enso-soft.conf /etc/nginx/sites-enabled/enso-soft.conf
#   3) sudo nginx -t && sudo systemctl reload nginx
#   (와일드카드 *.ensoft.me 블록보다 정확한 server_name 매칭이 우선하므로 충돌 없음)
# ============================================
server {
    listen 443 ssl;
    server_name studio.ensoft.me;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    ssl_certificate /etc/letsencrypt/live/ensoft.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ensoft.me/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # 이미지 업로드(S3 프록시) 고려
    client_max_body_size 32M;

    location / {
        proxy_pass http://127.0.0.1:8015;
        include /etc/nginx/snippets/proxy-common.conf;
    }
}
